name: Create release

on:
  push:
    tags:
      - '*.*.*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-tags: 'true'
          fetch-depth: '0'

      - name: prepare deb
        run: |
          mkdir -p .debpkg/usr/bin
          mkdir -p .debpkg/etc/jwks-converter
          cp jwks-to-pubkey pubkey-to-jwks .debpkg/usr/bin/
          git describe --tags --always HEAD > .debpkg/etc/jwks-converter/version 

      - name: build deb
        uses: jiro4989/build-deb-action@v4
        with:
          package: jwks-converter
          package_root: .debpkg
          maintainer: support@wondernetwork.com
          section: default
          priority: optional
          version: ${{ github.ref }}
        id: deb

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.deb.outputs.file_name }}
